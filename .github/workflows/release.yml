name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: rust-src
          
      - name: Install bpf-linker
        run: cargo install bpf-linker
        
      - name: Install Cross-Compilation Tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
        
      - name: Build eBPF Probe
        run: cargo build --target bpfel-unknown-none -Z build-std=core --release -p driftmap-probe
        
      - name: Build Userspace CLI
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }} -p driftmap-cli
          
      - name: Prepare Artifact
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/driftmap release/driftmap-${{ matrix.target }}
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: driftmap-${{ matrix.target }}
          path: release/driftmap-${{ matrix.target }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Display structure of downloaded files
        run: ls -R artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
