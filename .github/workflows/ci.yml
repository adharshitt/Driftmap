name: DriftMap CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - name: Build Cache
        uses: Swatinem/rust-cache@v2
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo check
        run: cargo check --all-targets --all-features
      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: bpfel-unknown-none
          components: rust-src
      - name: Install bpf-linker
        run: cargo install bpf-linker
      - name: Build Cache
        uses: Swatinem/rust-cache@v2
      - name: Build eBPF Probe
        run: cargo build -p driftmap-probe --target bpfel-unknown-none -Z build-std=core
      - name: Run all tests
        run: cargo test --workspace --exclude driftmap-probe
