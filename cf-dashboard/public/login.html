<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | DriftMap</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --text: #ffffff;
      --subtext: #888888;
      --primary: #3b82f6;
      --border: #2a2a2a;
      --accent-gradient: linear-gradient(135deg, #00fff0 0%, #0070ff 50%, #ff00e5 100%);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 2rem;
    }
    .logo-orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent-gradient);
      margin: 0 auto 2.5rem auto;
      box-shadow: 0 0 40px rgba(0, 112, 255, 0.3);
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: var(--subtext); margin-bottom: 2.5rem; }
    .input-field {
      width: 100%;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .hidden { display: none; }
    .status { margin-top: 1rem; font-size: 0.9rem; color: var(--accent); }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-orb"></div>
    
    <!-- Step 1: Email -->
    <div id="email-step">
      <h1>Welcome back</h1>
      <p>Enter your email to sign in to DriftMap.</p>
      <input type="email" id="email" class="input-field" placeholder="name@example.com">
      <button class="btn btn-primary" id="send-btn" onclick="sendOTP()">Continue with Email</button>
    </div>

    <!-- Step 2: OTP -->
    <div id="otp-step" class="hidden">
      <h1>Check your inbox</h1>
      <p>We sent a 6-digit code to your email.</p>
      <input type="text" id="otp" class="input-field" placeholder="000000" maxlength="6">
      <button class="btn btn-primary" id="verify-btn" onclick="verifyOTP()">Verify Code</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    let auth_token = '';

    async function sendOTP() {
      const email = document.getElementById('email').value;
      const btn = document.getElementById('send-btn');
      const status = document.getElementById('status');
      
      if (!email) return alert('Email required');
      
      btn.disabled = true;
      status.textContent = 'Sending code...';

      try {
        const res = await fetch('/api/auth/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          auth_token = data.token;
          document.getElementById('email-step').classList.add('hidden');
          document.getElementById('otp-step').classList.remove('hidden');
          status.textContent = 'Code sent successfully.';
        } else {
          throw new Error(data.error || 'Failed to send OTP');
        }
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        btn.disabled = false;
      }
    }

    async function verifyOTP() {
      const otp = document.getElementById('otp').value;
      const btn = document.getElementById('verify-btn');
      const status = document.getElementById('status');

      if (otp.length !== 6) return alert('Enter 6-digit code');

      btn.disabled = true;
      status.textContent = 'Verifying...';

      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: auth_token, otp })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          status.textContent = 'Login successful! Redirecting...';
          setTimeout(() => location.href = '/', 1000);
        } else {
          throw new Error(data.error || 'Invalid or expired code');
        }
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
