<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Spline | Onboarding</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --text: #ffffff;
      --subtext: #888888;
      --primary: #3b82f6;
      --border: #2a2a2a;
      --accent-gradient: linear-gradient(135deg, #00fff0 0%, #0070ff 50%, #ff00e5 100%);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .onboarding-container {
      width: 100%;
      max-width: 440px;
      text-align: center;
      padding: 2rem;
      transition: opacity 0.3s, transform 0.3s;
    }
    .logo-container {
      margin-bottom: 2.5rem;
      display: flex;
      justify-content: center;
    }
    .logo-orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 40px rgba(0, 112, 255, 0.3);
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--subtext);
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s;
      border: none;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-primary { background-color: var(--primary); color: white; }
    .btn-secondary { background-color: var(--card); color: white; border: 1px solid var(--border); }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { transform: scale(0.98); }

    .input-field {
      width: 100%;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    .input-field:focus { outline: 2px solid var(--primary); border-color: transparent; }

    .progress-bar {
      position: fixed;
      bottom: 40px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .progress-step {
      width: 32px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.3s;
    }
    .progress-step.active { background: #555; }
    .progress-step.completed { background: var(--primary); }

    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.4s ease-out; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="onboarding-container" id="app">
    <div class="logo-container">
      <div class="logo-orb"></div>
    </div>

    <!-- Step 1: Welcome -->
    <div class="step active" id="step-1">
      <h1>Welcome to DriftMap</h1>
      <p>eBPF-powered behavioral drift detection.</p>
      <button class="btn btn-primary" onclick="nextStep()">
        Start Observing
      </button>
      <button class="btn btn-secondary" onclick="window.open('https://github.com/adharshitt/Driftmap', '_blank')">View GitHub</button>
    </div>

    <!-- Step 2: Configuration -->
    <div class="step" id="step-2">
      <h1>Probe Configuration</h1>
      <p>Setup your network observation ports.</p>
      <div style="display: flex; gap: 10px;">
        <input type="number" class="input-field" placeholder="Target A Port" value="8080">
        <input type="number" class="input-field" placeholder="Target B Port" value="8081">
      </div>
      <button class="btn btn-primary" onclick="nextStep()">Initialize eBPF</button>
    </div>

    <!-- Step 3: Deployment -->
    <div class="step" id="step-3">
      <h1>Edge Dashboard</h1>
      <p>Stream real-time regressions to the global edge.</p>
      <button class="btn btn-secondary" onclick="nextStep()">Cloudflare Edge (Live)</button>
      <button class="btn btn-secondary" onclick="nextStep()">Local TUI (Terminal)</button>
    </div>

    <!-- Step 4: Finalize -->
    <div class="step" id="step-4">
      <h1>Ready to Drift</h1>
      <p>Your environment is fully weaponized.</p>
      <button class="btn btn-primary" onclick="location.href='https://driftmap-dashboard.pages.dev'">Launch Dashboard</button>
    </div>
  </div>

  <div class="progress-bar" id="progress">
    <div class="progress-step active"></div>
    <div class="progress-step"></div>
    <div class="progress-step"></div>
    <div class="progress-step"></div>
  </div>

  <script>
    let currentStep = 1;
    const totalSteps = 4;

    function nextStep() {
      if (currentStep < totalSteps) {
        document.getElementById(`step-${currentStep}`).classList.remove('active');
        document.querySelectorAll('.progress-step')[currentStep-1].classList.add('completed');
        
        currentStep++;
        
        document.getElementById(`step-${currentStep}`).classList.add('active');
        document.querySelectorAll('.progress-step')[currentStep-1].classList.add('active');
      }
    }
  </script>

</body>
</html>
